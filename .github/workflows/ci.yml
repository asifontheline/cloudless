name: CI validation

# The validation engine: every check-in from anywhere in the world is built,
# vetted, and tested before it can reach main. Runs on pull requests and on
# any pushed branch except main itself.

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cloudless/go.mod
          cache-dependency-path: cloudless/go.sum
      - name: Build
        working-directory: cloudless
        run: go build ./...
      - name: Vet
        working-directory: cloudless
        run: go vet ./...
      - name: Test with coverage
        working-directory: cloudless
        run: |
          go test -coverprofile=coverage.out ./...
          echo "## Per-package coverage"
          go tool cover -func=coverage.out | tail -1
          go test -cover ./... 2>/dev/null | grep -v "no test files" || true

      # Tests-required policy (L5, #88): a PR may not reduce total coverage.
      # Soft gate — prints a loud warning; becomes a hard gate once the L1
      # regression backfill lands.
      - name: Coverage no-decrease check (soft)
        if: github.event_name == 'pull_request'
        working-directory: cloudless
        run: |
          head=$(go tool cover -func=coverage.out | tail -1 | grep -oE '[0-9.]+%' | tr -d '%')
          git fetch --quiet origin "${{ github.base_ref }}"
          git worktree add --quiet /tmp/base-tree FETCH_HEAD
          (cd /tmp/base-tree/cloudless && go test -coverprofile=/tmp/base-coverage.out ./...) >/dev/null 2>&1 || true
          base=$(go tool cover -func=/tmp/base-coverage.out 2>/dev/null | tail -1 | grep -oE '[0-9.]+%' | tr -d '%' || echo 0)
          echo "coverage: base ${base}% -> head ${head}%"
          if awk "BEGIN{exit !($head < $base - 0.1)}"; then
            echo "::warning title=Coverage decreased::Total coverage fell from ${base}% to ${head}%. The tests-required policy (#88) expects features to ship with their tests — this becomes a hard failure once L1 lands."
          fi
      - name: gofmt check
        working-directory: cloudless
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

  python-sdk:
    name: python sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Compile & import
        working-directory: sdk/python
        run: |
          python -m py_compile cloudless/__init__.py
          python -c "import cloudless; print('cloudless SDK', cloudless.__version__, 'imports cleanly')"

  js-sdk:
    name: js sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check & import
        working-directory: sdk/js
        run: |
          node --check cloudless.js
          node --input-type=module -e "import {Client,VERSION} from './cloudless.js'; if(typeof Client!=='function') process.exit(1); console.log('cloudless JS SDK', VERSION, 'imports cleanly');"

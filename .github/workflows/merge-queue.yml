name: Merge queue

# Every 2 hours, merge into main any reviewed PR whose validation checks are
# all green. "Reviewed" = carries the `ready-to-merge` label (added after
# review). This keeps main continuously up to date without ever merging a
# red build, and replaces long-lived direct commits to main.
#
# Pre-merge gate (L3, #86): a PR's checks were green at push time, but main
# may have moved since. Before merging, each PR is merged onto the *current*
# main locally and the full suite (build, vet, test, gofmt) runs on that
# result. A PR that is green in isolation but breaks against latest main is
# left for rebase instead of being merged.

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: cloudless/go.mod
          cache-dependency-path: cloudless/go.sum
      - name: Merge green, reviewed PRs (re-validated against latest main)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git config user.name "merge-queue"
          git config user.email "merge-queue@users.noreply.github.com"
          prs=$(gh pr list -R "$REPO" --state open --label ready-to-merge --json number --jq '.[].number')
          if [ -z "$prs" ]; then echo "No PRs labelled ready-to-merge."; exit 0; fi
          merged_any=false
          for pr in $prs; do
            echo "::group::PR #$pr"
            if ! gh pr checks "$pr" -R "$REPO"; then
              echo "PR #$pr has failing or pending checks — leaving for next cycle."
              echo "::endgroup::"; continue
            fi
            # Pre-merge gate: run the full suite on (current main + this PR).
            git fetch origin main "pull/$pr/head:pr-$pr"
            git checkout -B premerge origin/main
            if ! git merge --no-edit "pr-$pr"; then
              git merge --abort || true
              echo "PR #$pr does not merge cleanly onto latest main — leaving for rebase."
              echo "::endgroup::"; continue
            fi
            if ! (cd cloudless && go build ./... && go vet ./... && go test ./... && [ -z "$(gofmt -l .)" ]); then
              echo "PR #$pr is green in isolation but fails against latest main — leaving for rebase."
              gh pr comment "$pr" -R "$REPO" --body "Merge queue: checks are green on the branch, but the full test suite fails when this PR is merged onto current \`main\`. Please rebase and fix — the queue will retry next cycle." || true
              echo "::endgroup::"; continue
            fi
            echo "PR #$pr validates against latest main — squashing."
            # Branch protection requires the head be up to date with base. A
            # prior merge earlier in this same run can leave a later PR
            # BEHIND even though it just validated clean above — sync it and
            # wait for checks to re-report on the synced commit instead of
            # losing a full cron cycle to it.
            behind=$(gh pr view "$pr" -R "$REPO" --json mergeStateStatus --jq '.mergeStateStatus == "BEHIND"')
            synced_ok=true
            if [ "$behind" = "true" ]; then
              echo "PR #$pr is behind main — syncing and waiting for checks to re-run."
              gh pr update-branch "$pr" -R "$REPO"
              deadline=$((SECONDS + 600))
              synced_ok=false
              while [ "$SECONDS" -lt "$deadline" ]; do
                if gh pr checks "$pr" -R "$REPO" >/dev/null 2>&1; then
                  synced_ok=true
                  break
                fi
                sleep 15
              done
            fi
            if [ "$synced_ok" != "true" ]; then
              echo "PR #$pr did not go green after syncing within 10m — leaving for next cycle."
              echo "::endgroup::"; continue
            fi
            gh pr merge "$pr" -R "$REPO" --squash --delete-branch --admin
            merged_any=true
            echo "::endgroup::"
          done
          # A merge done with the default token does not trigger other
          # workflows, so kick the website deploy explicitly after merging.
          if [ "$merged_any" = true ]; then
            gh workflow run "Deploy website to MilesWeb" -R "$REPO" || true
          fi

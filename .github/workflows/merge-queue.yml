name: Merge queue

# Every 2 hours, merge into main any reviewed PR whose validation checks are
# all green. "Reviewed" = carries the `ready-to-merge` label (added after
# review). This keeps main continuously up to date without ever merging a
# red build, and replaces long-lived direct commits to main.
#
# Pre-merge gate (L3, #86): a PR's checks were green at push time, but main
# may have moved since. Before merging, each PR is merged onto the *current*
# main locally and the full suite (build, vet, test, gofmt) runs on that
# result. A PR that is green in isolation but breaks against latest main is
# left for rebase instead of being merged.

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: cloudless/go.mod
          cache-dependency-path: cloudless/go.sum
      - name: Merge green, reviewed PRs (re-validated against latest main)
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git config user.name "merge-queue"
          git config user.email "merge-queue@users.noreply.github.com"
          start_sha=$(git rev-parse origin/main)

          # A CI run triggered by this workflow's own push (gh pr
          # update-branch below) sometimes lands in a stuck "action_required"
          # state instead of running — a GitHub approval gate on bot-pushed
          # commits. Left alone it sits there forever since no human is
          # watching between cycles, so self-approve it before checking a
          # PR's status.
          approve_stuck_runs() {
            local branch="$1"
            local run_id
            for run_id in $(gh run list -R "$REPO" --branch "$branch" --limit 5 \
                --json databaseId,status,conclusion \
                --jq '.[] | select(.status=="completed" and .conclusion=="action_required") | .databaseId'); do
              echo "approving stuck run $run_id on $branch"
              gh api "repos/$REPO/actions/runs/$run_id/approve" -X POST >/dev/null 2>&1 || true
            done
          }

          prs=$(gh pr list -R "$REPO" --state open --label ready-to-merge --json number --jq '.[].number')
          if [ -z "$prs" ]; then echo "No PRs labelled ready-to-merge."; exit 0; fi
          merged_any=false
          for pr in $prs; do
            echo "::group::PR #$pr"
            head_branch=$(gh pr view "$pr" -R "$REPO" --json headRefName --jq .headRefName)
            approve_stuck_runs "$head_branch"
            if ! gh pr checks "$pr" -R "$REPO"; then
              echo "PR #$pr has failing or pending checks — leaving for next cycle."
              echo "::endgroup::"; continue
            fi
            # Pre-merge gate: run the full suite on (current main + this PR).
            git fetch origin main "pull/$pr/head:pr-$pr"
            git checkout -B premerge origin/main
            if ! git merge --no-edit "pr-$pr"; then
              git merge --abort || true
              echo "PR #$pr does not merge cleanly onto latest main — leaving for rebase."
              echo "::endgroup::"; continue
            fi
            if ! (cd cloudless && go build ./... && go vet ./... && go test ./... && [ -z "$(gofmt -l .)" ]); then
              echo "PR #$pr is green in isolation but fails against latest main — leaving for rebase."
              gh pr comment "$pr" -R "$REPO" --body "Merge queue: checks are green on the branch, but the full test suite fails when this PR is merged onto current \`main\`. Please rebase and fix — the queue will retry next cycle." || true
              echo "::endgroup::"; continue
            fi
            echo "PR #$pr validates against latest main — squashing."
            # Branch protection requires the head be up to date with base. A
            # prior merge earlier in this same run can leave a later PR
            # BEHIND even though it just validated clean above — but
            # GitHub's mergeStateStatus is computed asynchronously and can
            # still read stale (e.g. CLEAN) for seconds after that prior
            # merge, so checking it here loses the race almost every time.
            # Sync unconditionally instead of trusting it: a no-op when
            # already up to date, a real fix when not, either way followed
            # by waiting for checks to report on the resulting commit.
            gh pr update-branch "$pr" -R "$REPO" >/dev/null 2>&1 || true
            deadline=$((SECONDS + 600))
            synced_ok=false
            while [ "$SECONDS" -lt "$deadline" ]; do
              approve_stuck_runs "$head_branch"
              if gh pr checks "$pr" -R "$REPO" >/dev/null 2>&1; then
                synced_ok=true
                break
              fi
              sleep 15
            done
            if [ "$synced_ok" != "true" ]; then
              echo "PR #$pr did not go green within 10m of squashing — leaving for next cycle."
              echo "::endgroup::"; continue
            fi
            gh pr merge "$pr" -R "$REPO" --squash --delete-branch --admin
            merged_any=true
            echo "::endgroup::"
          done
          # A merge done with the default token can't trigger other
          # workflows (#67) — no push event fires, and gh workflow run
          # with this same token is silently refused too. So instead of
          # dispatching a separate deploy workflow, detect here whether
          # anything under website/ actually changed and deploy inline,
          # in the next step of this same job.
          website_changed=false
          if [ "$merged_any" = true ]; then
            git fetch origin main -q
            if ! git diff --quiet "$start_sha" origin/main -- website/; then
              website_changed=true
            fi
          fi
          echo "website_changed=$website_changed" >> "$GITHUB_OUTPUT"

      - name: Check out final merged main
        if: steps.merge.outputs.website_changed == 'true'
        run: git checkout main && git reset --hard origin/main

      - name: Deploy website over FTPS (inline — #67)
        if: steps.merge.outputs.website_changed == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: website/
          server-dir: cldless.com/
          exclude: |
            **/UPLOAD-TO-MILESWEB.md

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mesh console</title>
<style>
  :root { color-scheme: light dark;
    --ok:#2e9e5b; --warn:#c78a00; --plan:#8a8f98; --bad:#d64545;
    --line: color-mix(in srgb, currentColor 14%, transparent);
    --card: color-mix(in srgb, currentColor 5%, transparent);
    --accent:#4a7dbd; }
  * { box-sizing: border-box; }
  body { font: 15px/1.5 system-ui, sans-serif; margin: 0; }
  header { border-bottom: 1px solid var(--line); padding: 0 1rem; position: sticky; top: 0;
           backdrop-filter: blur(8px); background: color-mix(in srgb, Canvas 85%, transparent); }
  .brand { font-weight: 700; padding: .8rem .4rem .2rem; display: flex; align-items: center; gap: .5rem; }
  .brand small { color: var(--plan); font-weight: 400; }
  .brand .logo svg { height: 26px; width: auto; display: block; }
  .brand .wordmark s { color: var(--plan); text-decoration-color: var(--strike, #d64545); text-decoration-thickness: 2.5px; }
  nav { display: flex; flex-wrap: wrap; gap: .2rem; padding-bottom: .5rem; }
  nav a { padding: .35rem .7rem; border-radius: 6px; text-decoration: none; color: inherit; font-size: .9rem; }
  nav a.active, nav a:hover { background: var(--card); color: var(--accent); }
  main { max-width: 980px; margin: 1.5rem auto; padding: 0 1rem; }
  h1 { font-size: 1.25rem; } h2 { font-size: 1.05rem; margin-top: 1.6rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: .8rem; }
  .card { border: 1px solid var(--line); background: var(--card); border-radius: 10px; padding: .9rem; }
  .card a.title { font-weight: 600; text-decoration: none; color: var(--accent); }
  .card p { margin: .4rem 0 0; font-size: .87rem; color: color-mix(in srgb, currentColor 75%, transparent); }
  .badge { float: right; font-size: .7rem; padding: .1rem .5rem; border-radius: 99px; border: 1px solid var(--line); }
  .b-live { color: var(--ok); } .b-progress { color: var(--warn); } .b-planned { color: var(--plan); }
  table { width: 100%; border-collapse: collapse; margin: .5rem 0 1.5rem; }
  th, td { text-align: left; padding: .4rem .6rem; border-bottom: 1px solid var(--line); }
  th { color: var(--plan); font-weight: 600; font-size: .78rem; text-transform: uppercase; }
  .ok { color: var(--ok); font-weight: 600; } .bad { color: var(--bad); font-weight: 600; }
  .muted { color: var(--plan); }
  #err { color: var(--bad); display: none; }
  .crumb { font-size: .85rem; } .crumb a { color: var(--accent); text-decoration: none; }
  .principle { border-left: 3px solid var(--accent); padding: .2rem .8rem; margin: 1rem 0; font-size: .9rem;
               color: color-mix(in srgb, currentColor 80%, transparent); }
  code { background: var(--card); padding: .1rem .35rem; border-radius: 4px; font-size: .85em; }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="logo" id="logo"></span><span class="wordmark"><s>Cloud</s>Less</span> <small>· cheap hardware, networked to beat the cloud (prototype)</small></div>
  <nav id="nav"></nav>
</header>
<main id="main"></main>
<script>
// ---- logo of the day --------------------------------------------------------
// Seven original marks, rotated by weekday (Sun..Sat). Same SVG feeds the
// header logo and the favicon.

  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 84"><path d="M28 62 h44 a14 14 0 0 0 2-27.8 A20 20 0 0 0 35 27 a13 13 0 0 0-7 35 z" fill="none" stroke="#4a7dbd" stroke-width="6" stroke-linejoin="round"/><line x1="16" y1="72" x2="84" y2="12" stroke="#d64545" stroke-width="7" stroke-linecap="round"/></svg>`,
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="#d64545" stroke-width="8"/><path d="M32 62 h34 a11 11 0 0 0 1.5-21.8 A15.5 15.5 0 0 0 38 35 a10 10 0 0 0-6 27 z" fill="none" stroke="#4a7dbd" stroke-width="5" stroke-linejoin="round"/><line x1="21" y1="79" x2="79" y2="21" stroke="#d64545" stroke-width="8" stroke-linecap="round"/></svg>`,
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 70"><text x="8" y="50" font-family="system-ui, sans-serif" font-size="44" font-weight="800" fill="#4a7dbd">L</text><line x1="10" y1="35" x2="60" y2="35" stroke="#d64545" stroke-width="8" stroke-linecap="round" transform="rotate(-18 35 35)"/></svg>`,
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 84"><path d="M28 62 a13 13 0 0 1 7-35 a20 20 0 0 1 27 6" fill="none" stroke="#8a8f98" stroke-width="5" stroke-linecap="round"/><line x1="14" y1="70" x2="72" y2="14" stroke="#d64545" stroke-width="5" stroke-linecap="round"/><g stroke="#4a7dbd" stroke-width="2.5"><line x1="72" y1="34" x2="88" y2="44"/><line x1="88" y1="44" x2="80" y2="62"/><line x1="72" y1="34" x2="80" y2="62"/><line x1="80" y1="62" x2="58" y2="62"/><line x1="72" y1="34" x2="58" y2="62"/></g><g fill="#4a7dbd"><circle cx="72" cy="34" r="5.5"/><circle cx="88" cy="44" r="5.5"/><circle cx="80" cy="62" r="5.5"/><circle cx="58" cy="62" r="5.5"/></g></svg>`,
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 84"><path d="M28 64 h44 a14 14 0 0 0 2-27.8 A20 20 0 0 0 35 29 a13 13 0 0 0-7 35 z" fill="#4a7dbd" fill-opacity="0.18" stroke="#4a7dbd" stroke-width="4.5" stroke-linejoin="round"/><line x1="10" y1="47" x2="90" y2="47" stroke="#d64545" stroke-width="4.5" stroke-dasharray="9 7" stroke-linecap="round"/></svg>`,
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 84"><path d="M26 66 h48 a15 15 0 0 0 2-29.8 A21 21 0 0 0 34 28 a14 14 0 0 0-8 38 z" fill="#4a7dbd"/><g stroke="#ffffff" stroke-width="9" stroke-linecap="round"><line x1="35" y1="36" x2="65" y2="60"/><line x1="65" y1="36" x2="35" y2="60"/></g></svg>`,
];
const todaysLogo = LOGOS[new Date().getDay()];
document.getElementById("logo").innerHTML = todaysLogo;
const fav = document.createElement("link");
fav.rel = "icon"; fav.type = "image/svg+xml";
fav.href = "data:image/svg+xml;utf8," + encodeURIComponent(todaysLogo);
document.head.appendChild(fav);

// ---- capability catalog -----------------------------------------------------
// status: live = works today · progress = milestone underway · planned = build later
const SECTIONS = [
  { id:"dashboard", label:"Dashboard" },
  { id:"map", label:"Map" },
  { id:"about", label:"About" },
  { id:"features", label:"Features" },
  { id:"contribute", label:"Contribute" },
  { id:"ai", label:"Cloud AI", items:[
    ["chat","Chat & Completions","Standard chat-completions API served by the mesh with routing and failover.","live"],
    ["embeddings","Embeddings","Vector embeddings endpoint on the same gateway; runs on any node.","planned"],
    ["speech-in","Speech to Text","Private transcription on group hardware.","planned"],
    ["speech-out","Text to Speech","Voice synthesis served from mesh nodes.","planned"],
    ["translate","Translation","Text translation with open models; data never leaves the mesh.","planned"],
    ["images","Image Generation","Image synthesis jobs on GPU nodes.","planned"],
    ["vision","Vision & OCR","Image understanding and document text extraction.","planned"],
    ["finetune","Fine-tuning","Adapter fine-tunes on a single capable node.","planned"],
    ["vectors","Vector Search","Semantic search store paired with the inference gateway.","planned"],
  ]},
  { id:"compute", label:"Cloud Compute", items:[
    ["batch","Batch Jobs","Parallel jobs (render, transcode, data prep) spread across peers.","planned"],
    ["cron","Scheduled Jobs","Recurring tasks that survive node failure via failover.","planned"],
    ["containers","Containers","Sandboxed container workloads dispatched to nodes.","planned"],
    ["functions","Functions","Short sandboxed jobs routed like inference requests.","planned"],
    ["media","Media Transcode","Distributed audio/video conversion jobs.","planned"],
  ]},
  { id:"storage", label:"Cloud Storage", items:[
    ["models","Model Commons","Hash-verified artifact store; safe formats only.","live"],
    ["objects","Object Store","Replicated content-addressed storage across trusted peers.","planned"],
    ["backup","Backup & Archive","Encrypted k-of-n replicated backups on community disks.","planned"],
    ["artifacts","Artifact Registry","Container images and build artifacts on the same blob store.","planned"],
  ]},
  { id:"data", label:"Cloud Data", items:[
    ["queues","Queues & Events","Durable message queues and event routing inside the mesh.","planned"],
    ["kv","Key-Value Store","Replicated key-value data with eventual consistency.","planned"],
    ["telemetry","Time-series","Metrics storage — also used by the mesh's own monitoring.","planned"],
    ["sql","Ad-hoc SQL","Query files stored in the mesh with embedded analytics engines.","planned"],
    ["workflows","Workflows","Multi-step job orchestration over the queue substrate.","planned"],
  ]},
  { id:"network", label:"Network", items:[
    ["overlay","Mesh Overlay","Encrypted private network joining all nodes (one-command join).","planned"],
    ["gateway","Gateway & Balancing","Ranked routing, health checks, circuit breaking.","live"],
    ["naming","Internal Naming","Stable names for nodes and services inside the mesh.","planned"],
  ]},
  { id:"security", label:"Security", items:[
    ["share","Resource Sharing","Set how much of this machine to share — 5% default, up to 70%.","live"],
    ["members","Members & API Keys","Per-user keys, roles, and access control.","live"],
    ["join","Join Tokens","Invite new nodes from the browser; encrypted membership.","progress"],
    ["secrets","Secrets","Encrypted replicated secrets unlocked by the cluster key.","planned"],
    ["certs","Certificates","Cluster CA with per-node certificates and mutual TLS.","progress"],
    ["audit","Audit Log","Hash-chained, tamper-evident record of administrative actions.","live"],
  ]},
  { id:"ops", label:"Operations", items:[
    ["monitor","Monitoring","Node health, latencies, and routing decisions (live below).","live"],
    ["logs","Logs","Centralized log collection across nodes.","planned"],
    ["usage","Usage & Credits","Per-key accounting — the seed of cooperative credits.","live"],
    ["ledger","Contribution Ledger","Who gave compute and who consumed it — the fairness view.","live"],
    ["savings","Cost Calculator","What the mesh's work would have cost on a metered hosted API.","live"],
    ["capacity","Idle Capacity","Healthy nodes with nothing to do — capacity already paid for.","live"],
    ["dr","Replication & Recovery","k-of-n redundancy and automatic failover policy.","progress"],
  ]},
];
const BADGE = { live:["Live","b-live"], progress:["In progress","b-progress"], planned:["Planned","b-planned"] };

// ---- routing ----------------------------------------------------------------
const nav = document.getElementById("nav"), main = document.getElementById("main");
nav.innerHTML = SECTIONS.map(s => `<a href="#/${s.id}" data-id="${s.id}">${s.label}</a>`).join("");

function route() {
  const parts = (location.hash || "#/dashboard").slice(2).split("/");
  const sec = SECTIONS.find(s => s.id === parts[0]) || SECTIONS[0];
  nav.querySelectorAll("a").forEach(a => a.classList.toggle("active", a.dataset.id === sec.id));
  if (sec.id === "dashboard") return renderDashboard();
  if (sec.id === "map") return renderMap();
  if (sec.id === "about") return renderAbout();
  if (sec.id === "features") return renderFeatures();
  if (sec.id === "contribute") return renderContribute();
  if (parts[1]) return renderItem(sec, parts[1]);
  renderSection(sec);
}
window.addEventListener("hashchange", route);

function renderSection(sec) {
  stopPolling();
  main.innerHTML = `<h1>${sec.label}</h1>
  <div class="grid">` + sec.items.map(([id, name, desc, st]) => `
    <div class="card"><span class="badge ${BADGE[st][1]}">${BADGE[st][0]}</span>
      <a class="title" href="#/${sec.id}/${id}">${name}</a>
      <p>${desc}</p>
    </div>`).join("") + `</div>`;
}

function renderItem(sec, id) {
  stopPolling();
  if (sec.id === "ops" && id === "usage") return renderUsage();
  if (sec.id === "ops" && id === "ledger") return renderLedger();
  if (sec.id === "security" && id === "members") return renderKeys();
  if (sec.id === "security" && id === "share") return renderShare();
  if (sec.id === "security" && id === "audit") return renderAudit();
  if (sec.id === "ops" && id === "savings") return renderSavings();
  if (sec.id === "ops" && id === "capacity") return renderCapacity();
  if (sec.id === "storage" && id === "models") return renderModels();
  const it = sec.items.find(i => i[0] === id);
  if (!it) return renderSection(sec);
  const [, name, desc, st] = it;
  main.innerHTML = `<p class="crumb"><a href="#/${sec.id}">${sec.label}</a> / ${name}</p>
  <h1>${name} <span class="badge ${BADGE[st][1]}">${BADGE[st][0]}</span></h1>
  <p>${desc}</p>
  <div class="principle">Built on the mesh principles: privacy-first (data stays on group hardware),
  cooperative ownership (no vendor), low-cost community machines, replication &amp; failover by default,
  web-managed with zero-friction setup.</div>
  ${st === "live"
    ? `<p>This capability is <strong>live</strong> on the current prototype. See the <a href="#/dashboard">dashboard</a>.</p>`
    : `<p class="muted">Section reserved — this capability will be designed and built as its own work item.
       Management UI, HTTP API, and CLI will land together per the one-surface rule.</p>`}`;
}

// ---- network map (live) ------------------------------------------------------
// Hierarchical view: continent / country / state / city / village. Green dot =
// healthy node, red = down. Levels expand/collapse; open state survives refresh.
function renderMap() {
  main.innerHTML = `<h1>Network map <span class="badge b-live">Live</span></h1>
  <p>The community's shared picture: every node, by locality.
  <span class="ok">●</span> healthy &nbsp; <span class="bad">●</span> down.
  Set a node's place with <code>up -location continent/country/state/city/village</code>.</p>
  <div id="maptree"></div>
  <p class="muted" id="mapsum"></p>`;
  const openSet = new Set(JSON.parse(sessionStorage.getItem('mapOpen') || '[]'));
  const load = async () => {
    try {
      const d = await (await fetch('/status')).json();
      const root = { children: {}, nodes: [] };
      let up = 0, down = 0;
      (d.backends || []).forEach(b => {
        b.Healthy ? up++ : down++;
        const path = (b.Backend.location || 'unlocated').split('/').filter(Boolean);
        let cur = root;
        path.forEach(seg => {
          cur.children[seg] = cur.children[seg] || { children: {}, nodes: [] };
          cur = cur.children[seg];
        });
        cur.nodes.push(b);
      });
      const dot = h => `<span class="${h?'ok':'bad'}" style="font-size:1.1em">●</span>`;
      const stats = t => {
        let u = 0, dn = 0;
        (function walk(n){ n.nodes.forEach(b => b.Healthy ? u++ : dn++); Object.values(n.children).forEach(walk); })(t);
        return {u, dn};
      };
      const render = (tree, prefix) => {
        let html = '';
        Object.keys(tree.children).sort().forEach(seg => {
          const id = prefix + '/' + seg, child = tree.children[seg], s = stats(child);
          html += `<details data-mid="${esc(id)}" ${openSet.has(id)?'open':''} style="margin:.25rem 0 .25rem 1rem">
            <summary style="cursor:pointer">${esc(seg)} — <span class="ok">${s.u}●</span>${s.dn?` <span class="bad">${s.dn}●</span>`:''}</summary>
            ${render(child, id)}</details>`;
        });
        tree.nodes.forEach(b => {
          html += `<div style="margin:.15rem 0 .15rem 2.2rem">${dot(b.Healthy)} ${esc(b.Backend.name)}
            <span class="muted" style="font-size:.8rem">${b.Healthy ? b.LatencyMS+' ms' : 'down'}</span>
            <a href="#" data-revoke="${esc(b.Backend.name)}" style="font-size:.78rem;margin-left:.5rem;color:var(--bad,#d64545)">revoke</a></div>`;
        });
        return html;
      };
      document.getElementById('maptree').innerHTML =
        render(root, '') || '<p class="muted">No nodes yet.</p>';
      document.getElementById('mapsum').textContent = `${up} healthy · ${down} down · ${up+down} nodes total.`;
      document.querySelectorAll('[data-mid]').forEach(el => el.addEventListener('toggle', () => {
        el.open ? openSet.add(el.dataset.mid) : openSet.delete(el.dataset.mid);
        sessionStorage.setItem('mapOpen', JSON.stringify([...openSet]));
      }));
      document.querySelectorAll('[data-revoke]').forEach(a => a.onclick = async e => {
        e.preventDefault();
        if (!confirm('Revoke ' + a.dataset.revoke + '? Its certificate is refused mesh-wide and it is dropped from routing.')) return;
        const r = await fetch('/revoke/' + encodeURIComponent(a.dataset.revoke), {method:'POST',
          headers:{'Authorization':'Bearer '+(localStorage.getItem('adminKey')||'')}});
        if (!r.ok) alert('Revoke failed — need the admin key (set it on the Members page).');
        load();
      });
    } catch {}
  };
  load(); timer = setInterval(load, 3000);
}

// ---- about ------------------------------------------------------------------
function renderAbout() {
  stopPolling();
  main.innerHTML = `<h1>About <s style="color:var(--plan)">Cloud</s>Less</h1>
  <p><strong>An alternative to commercial cloud — a community mesh network spread across continents with no
  data centres, running on commodity hardware and the systems people already own.</strong></p>
  <p>Commercial clouds win by concentrating expensive machines in their data centres and renting them back
  to you. Cloudless inverts that: machines people already own — spare desktops, old workstations, consumer
  GPUs, even phones — federate into one mesh with replication, failover, and web management built in, owned
  by the people who run it.</p>
  <div class="principle">Privacy-first: data never leaves group hardware · Cooperatively owned: no vendor ·
  Cheap hardware first: heterogeneity is the design, not a compromise · Honest security: defense in depth,
  never "foolproof".</div>
  <h2>Product family</h2>
  <p><strong>Cloudless</strong> is the parent platform — node agent, mesh membership, gateway with failover,
  security backbone, this console.</p>
  <div class="grid">
    <div class="card"><span class="badge b-live">First child · current focus</span>
      <a class="title" href="#/ai">Cloud AI</a>
      <p>Inference on the mesh: chat, embeddings, speech, vision, images, vector search — where cloud cost and
      privacy pain are highest today.</p></div>
    <div class="card"><span class="badge b-planned">Child · planned</span>
      <a class="title" href="#/storage">Cloud Storage</a>
      <p>Model commons, object store, backup &amp; archive on community disks.</p></div>
    <div class="card"><span class="badge b-planned">Child · planned</span>
      <a class="title" href="#/compute">Cloud Compute</a>
      <p>Batch, scheduled jobs, containers, functions across peers.</p></div>
    <div class="card"><span class="badge b-planned">Child · planned</span>
      <a class="title" href="#/data">Cloud Data</a>
      <p>Queues, key-value, time-series, workflows on the same nodes.</p></div>
  </div>
  <p class="muted" style="margin-top:1rem">Every child service rides the same mesh, the same security backbone,
  and this same console. Open source on
  <a href="https://github.com/asifontheline/cloudless" target="_blank" rel="noopener">GitHub ↗</a> —
  see <a href="#/contribute">Contribute</a>.</p>`;
}

// ---- usage (live) -----------------------------------------------------------
function renderUsage() {
  main.innerHTML = `<p class="crumb"><a href="#/ops">Operations</a> / Usage &amp; Credits</p>
  <h1>Usage &amp; Credits <span class="badge b-live">Live</span></h1>
  <p>Requests and tokens per API key and node — the visibility layer that replaces the cloud bill,
  and the seed of the cooperative credit system.</p>
  <table><thead><tr><th>Key</th><th>Node</th><th>Requests</th><th>Prompt tok</th><th>Completion tok</th><th>Last used</th></tr></thead>
  <tbody id="usage"></tbody></table>
  <h2>Fair-use quotas</h2>
  <p id="limits" class="muted"></p>
  <table><thead><tr><th>Key</th><th>Requests last minute</th><th>Tokens today</th></tr></thead>
  <tbody id="quotas"></tbody></table>
  <p class="muted">Streaming responses count requests; token counts come from non-streaming responses.
  Updates every 3s.</p>`;
  const load = async () => {
    try {
      const d = await (await fetch('/usage')).json();
      document.getElementById('usage').innerHTML = (d.usage || []).map(u =>
        `<tr><td><code>${esc(u.api_key)}</code></td><td>${esc(u.backend)}</td><td>${u.requests}</td>` +
        `<td>${u.prompt_tokens}</td><td>${u.completion_tokens}</td><td>${esc((u.last_used||'').slice(11,19))}</td></tr>`).join('')
        || `<tr><td colspan="6" class="muted">No usage recorded yet.</td></tr>`;
      const L = d.limits || {};
      document.getElementById('limits').textContent =
        `Per key: ${L.requests_per_minute || 'unlimited'} requests/min · ${L.tokens_per_day || 'unlimited'} tokens/day. Exceeding returns 429 with Retry-After.`;
      document.getElementById('quotas').innerHTML = (d.quotas || []).map(q =>
        `<tr><td><code>${esc(q.key)}</code></td><td>${q.requests_last_min}</td><td>${q.tokens_today}</td></tr>`).join('')
        || `<tr><td colspan="3" class="muted">No activity yet.</td></tr>`;
    } catch {}
  };
  load(); timer = setInterval(load, 3000);
}

// ---- ledger (live) ----------------------------------------------------------
function renderLedger() {
  main.innerHTML = `<p class="crumb"><a href="#/ops">Operations</a> / Contribution Ledger</p>
  <h1>Contribution Ledger <span class="badge b-live">Live</span></h1>
  <p>The cooperative's fairness view: nodes that <strong>contributed</strong> compute and keys that
  <strong>consumed</strong> it. This ledger is the seed of the credit system — no bills, just balance.</p>
  <h2>Contributed (by node)</h2>
  <table><thead><tr><th>Node</th><th>Requests served</th><th>Tokens served</th><th>Share</th></tr></thead>
  <tbody id="give"></tbody></table>
  <h2>Consumed (by key)</h2>
  <table><thead><tr><th>Key</th><th>Requests</th><th>Tokens</th><th>Share</th></tr></thead>
  <tbody id="take"></tbody></table>
  <p class="muted" id="ltotal"></p>`;
  const row = l => `<tr><td><code>${esc(l.party)}</code></td><td>${l.requests}</td><td>${l.tokens}</td>` +
    `<td>${(l.share_pct||0).toFixed(1)}%</td></tr>`;
  const load = async () => {
    try {
      const d = await (await fetch('/ledger')).json();
      document.getElementById('give').innerHTML = (d.contributed||[]).map(row).join('') ||
        `<tr><td colspan="4" class="muted">Nothing yet.</td></tr>`;
      document.getElementById('take').innerHTML = (d.consumed||[]).map(row).join('') ||
        `<tr><td colspan="4" class="muted">Nothing yet.</td></tr>`;
      document.getElementById('ltotal').textContent = `Total tokens exchanged in the mesh: ${d.total_tokens||0}.`;
    } catch {}
  };
  load(); timer = setInterval(load, 3000);
}

// ---- model commons (live) ---------------------------------------------------
function renderModels() {
  main.innerHTML = `<p class="crumb"><a href="#/storage">Cloud Storage</a> / Model Commons</p>
  <h1>Model Commons <span class="badge b-live">Live</span></h1>
  <p>Content-addressed artifact store: everything is identified by SHA-256, verified on write and on
  demand. Only safe tensor formats are admitted (<code>.gguf</code>, <code>.safetensors</code>,
  <code>.onnx</code>) — pickle-based files are rejected because they can execute code.</p>
  <p><input id="mfile" type="file" style="font-size:.9rem">
  <button id="mup" style="padding:.4rem .8rem;border-radius:6px;border:1px solid var(--line);background:var(--card);color:var(--accent);cursor:pointer">Add artifact</button>
  &nbsp;·&nbsp;
  <input id="mpull" placeholder="model name" style="padding:.4rem;border:1px solid var(--line);border-radius:6px;background:var(--card);color:inherit">
  <button id="mpullb" style="padding:.4rem .8rem;border-radius:6px;border:1px solid var(--line);background:var(--card);color:var(--accent);cursor:pointer">Pull from mesh</button>
  <span class="muted">(admin key from the Members page is used)</span></p>
  <p id="mmsg" class="principle" style="display:none"></p>
  <table><thead><tr><th>Name</th><th>Format</th><th>Size</th><th>SHA-256</th><th></th><th></th></tr></thead>
  <tbody id="mlist"></tbody></table>`;
  const hdr = () => ({'Authorization': 'Bearer ' + (localStorage.getItem('adminKey') || '')});
  const msg = (t, bad) => { const m = document.getElementById('mmsg'); m.style.display = 'block';
    m.style.borderColor = bad ? 'var(--bad, #d64545)' : 'var(--accent)'; m.textContent = t; };
  const load = async () => {
    try {
      const d = await (await fetch('/store')).json();
      document.getElementById('mlist').innerHTML = (d.artifacts || []).map(e =>
        `<tr><td>${esc(e.name)}</td><td>${esc(e.format)}</td><td>${(e.size/1048576).toFixed(1)} MB</td>` +
        `<td><code>${esc(e.sha256.slice(0,16))}…</code></td>` +
        `<td><a href="#" data-vf="${esc(e.name)}">verify</a></td>` +
        `<td><a href="#" data-rm="${esc(e.name)}">delete</a></td></tr>`).join('')
        || `<tr><td colspan="6" class="muted">No artifacts yet — add a model file above.</td></tr>`;
      document.querySelectorAll('[data-vf]').forEach(a => a.onclick = async e => {
        e.preventDefault();
        const r = await (await fetch('/store/verify?name=' + encodeURIComponent(a.dataset.vf))).json();
        msg(a.dataset.vf + (r.ok ? ' — hash verified ✓' : ' — VERIFICATION FAILED: ' + (r.error || 'hash mismatch')), !r.ok);
      });
      document.querySelectorAll('[data-rm]').forEach(a => a.onclick = async e => {
        e.preventDefault();
        await fetch('/store/' + encodeURIComponent(a.dataset.rm), {method: 'DELETE', headers: hdr()});
        load();
      });
    } catch {}
  };
  document.getElementById('mpullb').onclick = async () => {
    const name = document.getElementById('mpull').value.trim();
    if (!name) return;
    msg('Pulling ' + name + ' from the mesh…', false);
    const r = await fetch('/store/pull?name=' + encodeURIComponent(name), {method: 'POST', headers: hdr()});
    const d = await r.json().catch(() => ({}));
    if (r.ok && d.pulled) msg('Pulled ' + name + ' from ' + d.from + ' (verified)', false);
    else if (r.ok) msg(name + ': ' + (d.reason || 'already present'), false);
    else msg(d.error || 'Not found in the mesh — try a public repository.', true);
    load();
  };
  document.getElementById('mup').onclick = async () => {
    const f = document.getElementById('mfile').files[0];
    if (!f) return;
    msg('Uploading ' + f.name + '…', false);
    const r = await fetch('/store?name=' + encodeURIComponent(f.name), {method: 'PUT', headers: hdr(), body: f});
    const d = await r.json().catch(() => ({}));
    if (r.ok) msg('Added ' + f.name + ' (' + d.format + ', sha256 ' + d.sha256.slice(0,16) + '…)', false);
    else msg(d.error || 'Upload rejected.', true);
    load();
  };
  load();
}

async function tick() {
  try {
    const r = await fetch('/status'); const d = await r.json();
    document.getElementById('err').style.display = 'none';
    document.getElementById('nodes').innerHTML = (d.backends || []).map(b =>
      `<tr><td>${esc(b.Backend.name)}</td><td><code>${esc(b.Backend.base_url)}</code></td>` +
      `<td class="${b.Healthy ? 'ok' : 'bad'}">${b.Healthy ? 'healthy' : 'unhealthy'}</td>` +
      `<td>${b.Healthy ? b.LatencyMS + ' ms' : '—'}</td></tr>`).join('');
    document.getElementById('routes').innerHTML = (d.routes || []).slice().reverse().map(x =>
      `<tr><td>${esc((x.time || '').slice(11, 19))}</td><td><code>${esc(x.path)}</code></td>` +
      `<td>${esc(x.backend)}</td><td>${x.status}</td></tr>`).join('');
  } catch { const e = document.getElementById('err'); if (e) e.style.display = 'block'; }
}
function esc(s) { return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ---- passwordless sign-in (passkeys / WebAuthn) -----------------------------
// base64url <-> ArrayBuffer helpers for the WebAuthn wire format.
function b64uToBuf(s){ s=s.replace(/-/g,'+').replace(/_/g,'/'); const p='='.repeat((4-s.length%4)%4);
  const bin=atob(s+p); const b=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i); return b.buffer; }
function bufToB64u(buf){ const b=new Uint8Array(buf); let s=''; for(const x of b) s+=String.fromCharCode(x);
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
// Recursively decode the server's credential options into ArrayBuffers.
function decodeCreation(o){ o.challenge=b64uToBuf(o.challenge); o.user.id=b64uToBuf(o.user.id);
  if(o.excludeCredentials) o.excludeCredentials.forEach(c=>c.id=b64uToBuf(c.id)); return o; }
function decodeRequest(o){ o.challenge=b64uToBuf(o.challenge);
  if(o.allowCredentials) o.allowCredentials.forEach(c=>c.id=b64uToBuf(c.id)); return o; }

async function passkeyRegister(){
  const name=(document.getElementById('pkname')||{}).value?.trim();
  if(!name) return pkMsg('Enter a name first.', true);
  try{
    const opts=await (await fetch('/auth/register/begin?name='+encodeURIComponent(name),{method:'POST'})).json();
    const cred=await navigator.credentials.create({publicKey:decodeCreation(opts.publicKey||opts)});
    const body={id:cred.id,rawId:bufToB64u(cred.rawId),type:cred.type,response:{
      attestationObject:bufToB64u(cred.response.attestationObject),
      clientDataJSON:bufToB64u(cred.response.clientDataJSON)}};
    const r=await fetch('/auth/register/finish?name='+encodeURIComponent(name),{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok) pkMsg('Registered! Now sign in with your fingerprint/face.', false);
    else pkMsg('Registration failed: '+(await r.text()), true);
  }catch(e){ pkMsg('Registration cancelled or unsupported: '+e.message, true); }
}
async function passkeyLogin(){
  const name=(document.getElementById('pkname')||{}).value?.trim();
  if(!name) return pkMsg('Enter your name first.', true);
  try{
    const opts=await (await fetch('/auth/login/begin?name='+encodeURIComponent(name),{method:'POST'})).json();
    const cred=await navigator.credentials.get({publicKey:decodeRequest(opts.publicKey||opts)});
    const body={id:cred.id,rawId:bufToB64u(cred.rawId),type:cred.type,response:{
      authenticatorData:bufToB64u(cred.response.authenticatorData),
      clientDataJSON:bufToB64u(cred.response.clientDataJSON),
      signature:bufToB64u(cred.response.signature),
      userHandle:cred.response.userHandle?bufToB64u(cred.response.userHandle):null}};
    const r=await fetch('/auth/login/finish?name='+encodeURIComponent(name),{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){ const d=await r.json(); localStorage.setItem('adminKey', d.token);
      pkMsg('Signed in as '+d.name+'. Your session key is set for this browser.', false); }
    else pkMsg('Sign-in failed: '+(await r.text()), true);
  }catch(e){ pkMsg('Sign-in cancelled or unsupported: '+e.message, true); }
}
function pkMsg(t,bad){ const m=document.getElementById('pkmsg'); if(!m) return;
  m.style.display='block'; m.style.borderColor=bad?'var(--bad,#d64545)':'var(--accent)'; m.textContent=t; }
window.passkeyRegister=passkeyRegister; window.passkeyLogin=passkeyLogin;

route();
</script>

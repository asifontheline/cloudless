openapi: "3.0.3"
info:
  title: Cloudless node API
  description: >
    The language-agnostic contract every Cloudless node serves. Inference uses
    the standard chat-completions wire format, so any existing client works
    with a base-URL swap. Platform endpoints manage the node and the mesh.
    Admin endpoints require the cluster admin key; inference accepts any
    active per-user key.
  version: "0.1.0"
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: http://localhost:8080
security:
  - bearer: []
paths:
  /v1/chat/completions:
    post:
      summary: Chat completion (standard wire format)
      description: >
        Routed to the best healthy node; fails over to the next-ranked node on
        any error before the first response byte reaches the client. Streaming
        (text/event-stream) and non-streaming both supported.
      parameters:
        - name: X-Race
          in: header
          required: false
          schema: { type: integer, minimum: 2, maximum: 4 }
          description: >
            Speculative racing (opt-in): run the same request on the N fastest
            healthy nodes and return the first complete answer; the rest are
            cancelled. Buffered responses only (streams take the normal path).
            Only the winning answer is metered.
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "200": { description: Completion (JSON or event stream) }
        "401": { description: Invalid API key }
        "429": { description: Per-key quota exceeded }
        "503": { description: Backpressure — retry after Retry-After seconds }
        "502": { description: All backends unavailable }
  /v1/batch:
    post:
      summary: Parallel fan-out of independent requests
      description: >
        1-64 independent requests divided across healthy nodes concurrently;
        results return in submission order. Each item keeps single-request
        semantics (failover, backpressure, quota, metering).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requests]
              properties:
                path: { type: string, default: /v1/chat/completions }
                requests: { type: array, minItems: 1, maxItems: 64, items: { type: object } }
      responses:
        "200":
          description: Ordered results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        status: { type: integer }
                        backend: { type: string }
                        body: { type: object }
        "400": { description: Bad batch (size or shape) }
  /healthz:
    get: { summary: Liveness probe, security: [], responses: { "200": { description: OK } } }
  /status:
    get:
      summary: Mesh status — nodes, routes, load
      security: []
      responses:
        "200": { description: "Backends with health/latency, recent routes, in-flight load" }
  /usage:
    get:
      summary: Per-key usage and quota status
      security: []
      responses: { "200": { description: Usage records, limits, quota state } }
  /ledger:
    get: { summary: Contribution & consumption ledger, security: [], responses: { "200": { description: Ledger } } }
  /capacity:
    get: { summary: Idle capacity surfacing, security: [], responses: { "200": { description: Capacity } } }
  /savings:
    get: { summary: Cost comparison vs commercial clouds, security: [], responses: { "200": { description: Savings } } }
  /audit:
    get:
      summary: Hash-chained audit log with integrity verdict
      security: []
      responses: { "200": { description: Entries plus intact/broken_at verdict } }
  /share:
    get:
      summary: This node's resource-share limits
      security: []
      responses: { "200": { description: "Limits, ceiling (70%), default (5%)" } }
    put:
      summary: Set share limits (admin; partial update)
      responses:
        "200": { description: Applied limits }
        "403": { description: Admin key required }
  /keys:
    get:
      summary: List per-user API keys, redacted (admin)
      responses: { "200": { description: Keys }, "403": { description: Admin key required } }
    post:
      summary: Create a per-user API key (admin)
      responses: { "200": { description: Full key, shown once }, "403": { description: Admin key required } }
  /keys/{prefix}:
    delete:
      summary: Revoke keys by redacted prefix (admin)
      parameters: [ { name: prefix, in: path, required: true, schema: { type: string } } ]
      responses: { "204": { description: Revoked }, "403": { description: Admin key required } }
  /join-tokens:
    post:
      summary: Mint a single-use expiring join token (admin, CA node)
      requestBody:
        required: false
        content:
          application/json:
            schema: { type: object, properties: { ttl_minutes: { type: integer, default: 15 } } }
      responses:
        "200": { description: "{token, expires}; recorded in the audit log" }
        "403": { description: Admin key required }
        "404": { description: Not the CA-holding node }
  /join-info:
    get:
      summary: What a new machine needs to join (admin — reveals the mesh secret)
      responses:
        "200": { description: "{secret, gossip_addr, api_url}" }
        "403": { description: Admin key required }
        "404": { description: Unavailable on this node }
  /enroll:
    post:
      summary: Enroll a joining node's public key for a certificate
      description: >
        HMAC over name|pub binds the request to the cluster secret; an optional
        single-use join token is validated and burned. Served only by the
        CA-holding node.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, pub, mac]
              properties:
                name: { type: string }
                pub: { type: string, description: base64 PKIX DER }
                mac: { type: string, description: base64 HMAC-SHA256(secret, name|pub) }
                token: { type: string, description: optional single-use join token }
      responses:
        "200": { description: "{ca (PEM), cert (base64 DER)}" }
        "401": { description: Rejected (bad MAC or bad/expired/reused token) }
  /revocations:
    get: { summary: Current node revocations, security: [], responses: { "200": { description: Revoked nodes } } }
  /revoke/{name}:
    post:
      summary: Evict a node mesh-wide (admin)
      parameters: [ { name: name, in: path, required: true, schema: { type: string } } ]
      responses:
        "204": { description: Revoked and broadcast }
        "403": { description: Admin key required }
        "409": { description: Already revoked or unknown }
  /store:
    get: { summary: List model artifacts (content-addressed), security: [], responses: { "200": { description: Artifacts } } }
  /vault:
    get:
      summary: List owner-encrypted vault objects (names and ciphertext hashes)
      security: []
      responses: { "200": { description: "{objects: [{name, sha256, size, sealed, added, compressed, last_accessed}]}" } }
  /vault/{name}:
    put:
      summary: Seal an object on this machine and replicate the ciphertext (admin)
      description: >
        The object is encrypted locally before it leaves this machine; the
        sealing key is generated here and never travels. Replicas on other
        nodes are ciphertext they cannot read. Acknowledged with the replica
        count reached.
      parameters: [ { name: name, in: path, required: true, schema: { type: string } } ]
      requestBody: { required: true, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
      responses:
        "200": { description: "{name, sha256, size, replicas, holders}" }
        "403": { description: Admin key required }
        "422": { description: Rejected (size or shape) }
    get:
      summary: Open a sealed object (admin; succeeds only on the owner's node)
      parameters: [ { name: name, in: path, required: true, schema: { type: string } } ]
      responses:
        "200": { description: Decrypted content }
        "403": { description: Admin key required }
        "404": { description: Unknown object, or this node cannot open it }
    delete:
      summary: Delete a vault object (admin)
      parameters: [ { name: name, in: path, required: true, schema: { type: string } } ]
      responses: { "204": { description: Deleted }, "403": { description: Admin key required } }
  /vault/compact:
    post:
      summary: Temperature-tier vault storage (admin, M7)
      description: >
        Compresses objects untouched past the hot window (cold, small);
        promotes objects read again since being compressed back to the fast
        tier (hot). Compression is applied to plaintext before sealing —
        already-encrypted bytes are pseudorandom and would not compress.
        Only objects this node holds the key for are eligible.
      parameters:
        - name: hot_window_hours
          in: query
          required: false
          schema: { type: number }
          description: "Hours since last access before an object is considered cold. Default 24."
      responses:
        "200": { description: "{compressed, decompressed, hot_window_hours}" }
        "400": { description: Invalid hot_window_hours }
        "403": { description: Admin key required }
        "404": { description: Vault unavailable on this node }
  /backup/export:
    post:
      summary: Export a passphrase-encrypted off-mesh backup (admin, M5)
      description: >
        Archive of this node's owned vault objects, its sealing key, and the
        model manifest — sealed with a key derived from the owner's
        passphrase (PBKDF2-SHA256, AES-256-GCM). Survives the whole mesh.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [passphrase], properties: { passphrase: { type: string } } }
      responses:
        "200": { description: Encrypted archive (application/octet-stream) }
        "403": { description: Admin key required }
        "422": { description: Rejected (empty passphrase) }
  /backup/import:
    post:
      summary: Re-import an off-mesh backup (admin, M5)
      description: >
        Objects are opened with the archived key in memory, re-sealed under
        this node's own key, and re-replicated to current mesh members.
        Existing local objects are never overwritten. Passphrase travels in
        the X-Backup-Passphrase header; body is the raw archive.
      requestBody: { required: true, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
      responses:
        "200": { description: "{objects: [{name, outcome, error}], model_refs}" }
        "403": { description: Admin key required }
        "422": { description: Wrong passphrase or corrupted archive }
  /restore:
    post:
      summary: Rebuild local objects from surviving replicas (admin, M4)
      description: >
        Pulls anything missing or hash-corrupt on this node back from mesh
        replicas, verifying hashes on write. Every requested object gets an
        explicit outcome — irrecoverable objects are listed, never silently
        dropped. Empty body restores everything known locally or in the mesh.
      requestBody:
        required: false
        content:
          application/json:
            schema: { type: object, properties: { names: { type: array, items: { type: string } } } }
      responses:
        "200": { description: "{models: [{name, outcome, from, sha256, error}], vault: [...]}" }
        "403": { description: Admin key required }
        "404": { description: Restore unavailable (no secure mesh) }
  /replication:
    get:
      summary: Per-object replica count and placement health (M1)
      security: []
      responses:
        "200": { description: "{target, objects: [{name, replicas, target, holders, domains, healthy}], scanned}" }
  /extensions:
    get:
      summary: List registered polyglot extensions (K4)
      security: []
      responses: { "200": { description: "{extensions: [{name, base_url, runtime, description, healthy}]}" } }
    post:
      summary: Register an extension (admin)
      description: >
        An extension is any HTTP service, in any language. Once registered it
        is reachable at /x/{name}/... with the same bearer keys as inference;
        the gateway strips mesh credentials before proxying and
        health-checks the service.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, base_url]
              properties:
                name: { type: string, pattern: "^[a-z0-9][a-z0-9-]{0,63}$" }
                base_url: { type: string }
                runtime: { type: string }
                description: { type: string }
      responses:
        "200": { description: Registered }
        "403": { description: Admin key required }
        "422": { description: Invalid name/URL or duplicate }
  /extensions/{name}:
    delete:
      summary: Deregister an extension (admin)
      parameters: [ { name: name, in: path, required: true, schema: { type: string } } ]
      responses: { "204": { description: Removed }, "403": { description: Admin key required } }
  /x/{name}/{path}:
    description: >
      Proxy to the named extension: all methods, path and query preserved,
      bearer auth enforced at the gateway, Authorization header stripped
      before the extension sees the request.
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      description: Cluster admin key (admin endpoints) or an active per-user key (inference).
